<!DOCTYPE html>
<html>
<head>
    <title>Smart Signup Form</title>
    <link rel="stylesheet" href="SmartSignupForm.css">
</head>
<body>

<div class="container">
    <h1>Signup</h1>

    <form id="signupForm">
        <input type="text" id="name" placeholder="Enter Name"><br>

        <input type="email" id="email" placeholder="Enter Email"><br>

        <input type="password" id="password" placeholder="Enter Password"><br>

        <button type="submit">Signup</button>
    </form>

    <p id="message"></p>
</div>

<script src="SmartSignupForm.js"></script>

</body>
</html>
