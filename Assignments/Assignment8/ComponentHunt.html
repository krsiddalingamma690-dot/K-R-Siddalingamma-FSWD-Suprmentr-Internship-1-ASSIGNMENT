<!DOCTYPE html>
<html>
<head>
    <title>Component Hunt</title>
    <link rel="stylesheet" href="ComponentHunt.css">
</head>
<body>

    <!-- Navbar Component -->
    <div class="navbar">
        <h2>MyShop</h2>
        <input type="text" placeholder="Search...">
    </div>

    <!-- Banner Component -->
    <div class="banner">
        <h1>Welcome to MyShop</h1>
    </div>

    <!-- Product Cards Component -->
    <div class="products">

        <div class="card">
            <h3>Product 1</h3>
            <p>Price: ₹100</p>
        </div>

        <div class="card">
            <h3>Product 2</h3>
            <p>Price: ₹200</p>
        </div>

        <div class="card">
            <h3>Product 3</h3>
            <p>Price: ₹300</p>
        </div>

    </div>

    <!-- Footer Component -->
    <div class="footer">
        <p>© 2026 MyShop</p>
    </div>

</body>
</html>
